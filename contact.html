<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hubungi JIHUBIL - Informasi kontak dan dukungan pelanggan." />
  <title>Kontak - JIHUBIL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg: #f5f7fb;
      --text: #182235;
      --primary: #da251d;
      --accent: #ffb703;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(25, 45, 90, .08);
    }
    h1 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 30px;
    }
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .contact-item i {
      color: var(--primary);
      font-size: 1.5em;
    }
    .contact-item div {
      flex: 1;
    }
    .contact-item h3 {
      margin-bottom: 5px;
      color: var(--text);
    }
    .contact-item p {
      color: #666;
    }
    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hubungi Kami</h1>
    <div class="contact-info">
      <div class="contact-item">
        <i class="fas fa-envelope"></i>
        <div>
          <h3>Email</h3>
          <p>support@jihubil.com</p>
        </div>
      </div>
      <div class="contact-item">
        <i class="fas fa-phone"></i>
        <div>
          <h3>Telepon</h3>
          <p>+62 21 1234 5678</p>
        </div>
      </div>
      <div class="contact-item">
        <i class="fas fa-map-marker-alt"></i>
        <div>
          <h3>Alamat</h3>
          <p>Jl. Contoh No. 123, Jakarta, Indonesia</p>
        </div>
      </div>
      <div class="contact-item">
        <i class="fas fa-clock"></i>
        <div>
          <h3>Jam Operasional</h3>
          <p>Senin - Jumat: 09:00 - 17:00 WIB</p>
        </div>
      </div>
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
  </div>
</body>
</html>
