<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kelola pesanan Anda di JIHUBIL - Lihat status dan riwayat pesanan." />
  <title>Pesanan - JIHUBIL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg: #f5f7fb;
      --text: #182235;
      --primary: #da251d;
      --accent: #ffb703;
      --green: #0ea765;
      --orange: #f97316;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(25, 45, 90, .08);
    }
    h1 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 40px;
    }
    .order {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-info h3 {
      margin-bottom: 5px;
      color: var(--text);
    }
    .order-info p {
      color: #666;
      margin-bottom: 5px;
    }
    .status {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 600;
    }
    .status.pending {
      background: var(--orange);
      color: white;
    }
    .status.completed {
      background: var(--green);
      color: white;
    }
    .status.processing {
      background: var(--accent);
      color: black;
    }
    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Daftar Pesanan</h1>
    <div class="order">
      <div class="order-info">
        <h3>Pesanan #001</h3>
        <p>Tanggal: 2024-04-01</p>
        <p>Total: Rp 150.000</p>
      </div>
      <span class="status completed">Selesai</span>
    </div>
    <div class="order">
      <div class="order-info">
        <h3>Pesanan #002</h3>
        <p>Tanggal: 2024-04-05</p>
        <p>Total: Rp 200.000</p>
      </div>
      <span class="status processing">Diproses</span>
    </div>
    <div class="order">
      <div class="order-info">
        <h3>Pesanan #003</h3>
        <p>Tanggal: 2024-04-07</p>
        <p>Total: Rp 75.000</p>
      </div>
      <span class="status pending">Menunggu</span>
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
  </div>
</body>
</html>
